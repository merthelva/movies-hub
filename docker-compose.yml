services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - .env.development.local
    environment:
      # Bind mounts don't reliably deliver fs change events into the container
      # on macOS/Windows Docker Desktop; polling forces Next to detect edits for HMR.
      - WATCHPACK_POLLING=true
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next

volumes:
  node_modules:
  next_cache:
